<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 100" width="280" height="100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&amp;display=swap');
    </style>
  </defs>
  <!-- White square logo mark (for dark backgrounds) -->
  <rect x="0" y="0" width="100" height="100" fill="#FFFFFF" rx="4" ry="4"/>
  <!-- Dark CDI text in logo mark -->
  <text x="50" y="58" 
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" 
        font-weight="900" 
        font-size="32" 
        fill="#0D1B2A" 
        text-anchor="middle" 
        dominant-baseline="middle">CDI</text>
  <!-- Wordmark in white -->
  <text x="120" y="30" 
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" 
        font-weight="700" 
        font-size="18" 
        fill="#FFFFFF" 
        text-anchor="start">CREW</text>
  <text x="120" y="54" 
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" 
        font-weight="700" 
        font-size="18" 
        fill="#FFFFFF" 
        text-anchor="start">DEVELOPMENT</text>
  <text x="120" y="78" 
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" 
        font-weight="700" 
        font-size="18" 
        fill="#FFFFFF" 
        text-anchor="start">INSTITUTE</text>
</svg>
